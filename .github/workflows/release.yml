name: release
on:
  push:
    tags: ['v*']

# Least privilege: build jobs need nothing beyond checkout (read); only the
# publish job writes release objects.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     target: aarch64-apple-darwin,       name: codegraph-macos-arm64,  features: "indexstore,local-embed,local-llm" }
          # macos-13 (Intel) runners are retired — cross-compile x64 from the arm64 runner.
          - { os: macos-14,     target: x86_64-apple-darwin,        name: codegraph-macos-x64,    features: "local-embed,local-llm" }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu,   name: codegraph-linux-x64,    features: "local-embed,local-llm" }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, name: codegraph-linux-arm64, features: "local-embed,local-llm" }
          - { os: windows-2022, target: x86_64-pc-windows-msvc,     name: codegraph-windows-x64.exe, features: "local-embed,local-llm" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p codegraph-cli --target ${{ matrix.target }} --features "${{ matrix.features }}"
      - name: Rename
        shell: bash
        run: cp target/${{ matrix.target }}/release/codegraph${{ contains(matrix.os, 'windows') && '.exe' || '' }} ${{ matrix.name }}
      - name: Portable IndexStore rpath (macOS arm64)
        if: contains(matrix.features, 'indexstore')
        shell: bash
        # the CI runner's Xcode lives at /Applications/Xcode_<ver>.app — a binary
        # carrying only that rpath dies with "Library not loaded: libIndexStore"
        # on every user machine (bit v1.31.0). Add the standard install path;
        # re-sign since install_name_tool invalidates the signature.
        run: |
          install_name_tool -add_rpath "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib" "${{ matrix.name }}"
          codesign -f -s - "${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          if-no-files-found: error

  # Single publisher: downloads EVERY expected artifact, validates the set, and
  # only then creates the release — draft first, published only after all
  # binaries are attached. A failed platform build means NO release at all,
  # never a silently incomplete one (the per-job `gh release upload --clobber`
  # pattern this replaces could publish 2 of 5 binaries).
  publish:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Validate artifact set
        shell: bash
        run: |
          expected="codegraph-macos-arm64 codegraph-macos-x64 codegraph-linux-x64 codegraph-linux-arm64 codegraph-windows-x64.exe"
          missing=0
          for f in $expected; do
            if [ ! -s "artifacts/$f" ]; then
              echo "MISSING or empty artifact: $f"
              missing=1
            fi
          done
          count=$(ls -1 artifacts | wc -l)
          echo "artifacts present: $count"
          ls -l artifacts
          [ "$missing" -eq 0 ] || exit 1
          [ "$count" -eq 5 ] || { echo "expected exactly 5 artifacts, found $count"; exit 1; }
      - name: Checksums (consumed by action/action.yml verify step)
        shell: bash
        run: |
          cd artifacts
          # deterministic order + the two-space format `sha256sum -c` expects
          sha256sum $(ls -1 | LC_ALL=C sort) > sha256sums.txt
          cat sha256sums.txt
      - name: Create draft release, attach, publish
        env: { GH_TOKEN: "${{ github.token }}" }
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft --generate-notes --title "${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" artifacts/* --repo "${GITHUB_REPOSITORY}"
          gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
