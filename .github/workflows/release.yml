name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     target: aarch64-apple-darwin,       name: codegraph-macos-arm64,  features: "indexstore,local-embed,local-llm" }
          # macos-13 (Intel) runners are retired — cross-compile x64 from the arm64 runner.
          - { os: macos-14,     target: x86_64-apple-darwin,        name: codegraph-macos-x64,    features: "local-embed,local-llm" }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu,   name: codegraph-linux-x64,    features: "local-embed,local-llm" }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, name: codegraph-linux-arm64, features: "local-embed,local-llm" }
          - { os: windows-2022, target: x86_64-pc-windows-msvc,     name: codegraph-windows-x64.exe, features: "local-embed,local-llm" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p codegraph-cli --target ${{ matrix.target }} --features "${{ matrix.features }}"
      - name: Rename
        shell: bash
        run: cp target/${{ matrix.target }}/release/codegraph${{ contains(matrix.os, 'windows') && '.exe' || '' }} ${{ matrix.name }}
      - name: Portable IndexStore rpath (macOS arm64)
        if: contains(matrix.features, 'indexstore')
        shell: bash
        # the CI runner's Xcode lives at /Applications/Xcode_<ver>.app — a binary
        # carrying only that rpath dies with "Library not loaded: libIndexStore"
        # on every user machine (bit v1.31.0). Add the standard install path;
        # re-sign since install_name_tool invalidates the signature.
        run: |
          install_name_tool -add_rpath "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib" "${{ matrix.name }}"
          codesign -f -s - "${{ matrix.name }}"
      - name: Upload to release
        env: { GH_TOKEN: "${{ github.token }}" }
        shell: bash
        # ensure the release object exists — a bare tag push has none, and
        # `gh release upload` fails with "release not found" (bit v1.31.0).
        # `create` failing because a parallel job won the race is fine.
        run: |
          gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}" 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" "${{ matrix.name }}" --clobber
