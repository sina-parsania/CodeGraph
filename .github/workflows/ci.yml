name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Tests
        run: cargo test --workspace
      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Build release
        run: cargo build --release -p codegraph-cli
      - name: Determinism guarantee (golden check)
        run: ./target/release/codegraph verify-determinism --path .
